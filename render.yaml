services:
  - type: web
    name: rankradar-os
    runtime: python
    rootDir: services/rankradar-worker
    plan: free
    buildCommand: pip install -r requirements.txt && cd ../../apps/web && npm install && npm run build
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: RANKRADAR_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATADIVE_PROVIDER
        value: live
      - key: DATADIVE_API_BASE_URL
        value: https://api.datadive.tools
      - key: DATADIVE_API_KEY
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: rankradar-os
