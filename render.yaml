services:
  - type: web
    name: rankradar-worker
    runtime: python
    rootDir: services/rankradar-worker
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: RANKRADAR_ENV
        value: production
      - key: DATADIVE_PROVIDER
        value: live
      - key: DATADIVE_API_BASE_URL
        value: https://api.datadive.tools
      - key: DATADIVE_API_KEY
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: rankradar-os

  - type: web
    name: rankradar-api
    runtime: node
    rootDir: apps/api
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_PORT
        value: 10000
      - key: PYTHON_SERVICE_URL
        value: https://rankradar-worker.onrender.com
      - key: API_ALLOWED_ORIGINS
        value: https://rankradar-web.onrender.com
      - key: API_RATE_LIMIT_PER_MINUTE
        value: 240

  - type: web
    name: rankradar-web
    runtime: static
    rootDir: apps/web
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://rankradar-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
